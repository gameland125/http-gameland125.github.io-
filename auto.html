<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Auto GoldHEN</title>
</head>
<body>

<h3>Loading GoldHEN...</h3>

<script>
function loadPayload(){
    fetch("payloads/goldhen.bin")
    .then(r => r.arrayBuffer())
    .then(b => {
        console.log("GoldHEN loaded");
        document.body.innerHTML = "GoldHEN Loaded ✔️";
    })
    .catch(e => {
        document.body.innerHTML = "Error loading payload";
    });
}

loadPayload();
</script>

</body>
</html>
