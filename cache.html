<!doctype html>
<html lang="fa" manifest="PSFree.manifest">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline Cache Installer</title>
<style>
body {
    background-color: white;
    color: black;
    font-size: 20px;
    text-align: center;
    margin: 0;
    overflow: hidden;
}
.info {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: sans-serif;
    white-space: nowrap;
}
</style>
<script>
(function () {
    function setMessage(message) {
        var element = document.getElementById('msgs');
        if (element) element.textContent = message;
    }

    function onProgress(event) {
        var percent = event.total ? Math.round(event.loaded / event.total * 100) : 0;
        setMessage('Installing Offline Cache ... ' + percent + '%');
    }

    function markAndGoToIndex() {
        // این خط، پرچم را برای اجرای خودکار در index.html تنظیم می‌کند
        localStorage.setItem('gamelandAutoGoldHEN', '1'); 
        
        setMessage('Cache Installed Successfully'); // پیام موفقیت را نمایش می‌دهیم
        setTimeout(function() {
            location.replace('index.html'); // سپس به index.html هدایت می‌کنیم
        }, 1000); // 1 ثانیه تاخیر
    }

    function onError() {
        setMessage('Offline cache installation failed');
    }

    window.addEventListener('load', function () {
        if (!window.applicationCache) {
            setMessage('Application cache is not supported');
            return;
        }

        var appCache = window.applicationCache;
        appCache.addEventListener('progress', onProgress, false);
        appCache.addEventListener('cached', markAndGoToIndex, false);
        appCache.addEventListener('updateready', markAndGoToIndex, false);
        appCache.addEventListener('noupdate', markAndGoToIndex, false);
        appCache.addEventListener('error', onError, false);
        
        // اطمینان از شروع فرآیند کش
        appCache.update(); 
    }, false);
}());
</script>
</head>
<body>
<div id="msgs" class="info">Preparing offline cache...</div>
</body>
</html>
