<!DOCTYPE html>
<html manifest="psfree_lapse.cache">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cache Installer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #1f1f1f;
            color: #e5e5e5;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #msgs {
            font-size: 28px;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="msgs">در حال نصب کش آفلاین...</div>

    <script>
        const msgs = document.getElementById("msgs");

        function displayCacheProgress(message) {
            msgs.textContent = message;
        }

        function markCacheInstalled() {
            localStorage.setItem("offlineCacheInstalled", "true");
            displayCacheProgress("کش آفلاین با موفقیت نصب شد");
        }

        if (window.applicationCache) {
            window.applicationCache.addEventListener("progress", function () {
                displayCacheProgress("در حال نصب کش آفلاین...");
            }, false);

            window.applicationCache.oncached = function () {
                markCacheInstalled();
            };

            window.applicationCache.onupdateready = function () {
                markCacheInstalled();
            };

            window.applicationCache.onerror = function () {
                displayCacheProgress("خطا در نصب کش آفلاین");
            };
        } else {
            displayCacheProgress("مرورگر از Application Cache پشتیبانی نمی‌کند");
        }
    </script>
</body>
</html>
