<!DOCTYPE html>
<html manifest="PSFree.manifest">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMELAND Offline Cache</title>

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #202020;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        #msgs {
            padding: 24px;
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="msgs">Preparing offline cache...</div>

    <script>
    (function () {
        var redirectStarted = false;

        function setMessage(message) {
            var element = document.getElementById('msgs');

            if (element) {
                element.textContent = message;
            }
        }

        function onProgress(event) {
            var percent = 0;

            if (event && event.total) {
                percent = Math.round(
                    (event.loaded / event.total) * 100
                );
            }

            setMessage(
                'Installing Offline Cache ... ' + percent + '%'
            );
        }

        function markAndGoToIndex() {
            if (redirectStarted) {
                return;
            }

            redirectStarted = true;

            try {
                localStorage.setItem(
                    'gamelandAutoGoldHEN',
                    '1'
                );
            } catch (error) {
                setMessage('Unable to save Auto-start setting');
            }

            location.replace('index.html');
        }

        function onInstalled() {
            if (redirectStarted) {
                return;
            }

            setMessage('Cache Installed Successfully');

            setTimeout(function () {
                markAndGoToIndex();
            }, 1000);
        }

        function onError() {
            if (redirectStarted) {
                return;
            }

            setMessage('Offline cache installation failed');
        }

        window.addEventListener('load', function () {
            var appCache;

            if (!window.applicationCache) {
                setMessage(
                    'Application cache is not supported'
                );
                return;
            }

            appCache = window.applicationCache;

            appCache.addEventListener(
                'progress',
                onProgress,
                false
            );

            appCache.addEventListener(
                'cached',
                onInstalled,
                false
            );

            appCache.addEventListener(
                'updateready',
                onInstalled,
                false
            );

            appCache.addEventListener(
                'noupdate',
                markAndGoToIndex,
                false
            );

            appCache.addEventListener(
                'error',
                onError,
                false
            );
        }, false);
    }());
    </script>
</body>
</html>
