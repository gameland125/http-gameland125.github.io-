<!DOCTYPE html>
<html manifest="PSFree.manifest">
<head>
    <meta charset="UTF-8">
    <title>Gameland Cache Installer</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #e0e0e0;
            font-family: sans-serif;
            text-align: center;
            padding-top: 15%;
            direction: rtl;
        }
        h1 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 20px;
        }
        #status {
            font-size: 20px;
            color: #bbbbbb;
        }
    </style>
</head>
<body>
    <h1>گیم لند - نصب آفلاین کش</h1>
    <h2 id="status">در حال بررسی وضعیت کش...</h2>

    <script>
        var appCache = window.applicationCache;
        var statusEl = document.getElementById('status');

        function markAndGoToIndex() {
            try {
                // ثبت پرچم در حافظه محلی برای اجرای خودکار در index.html
                localStorage.setItem('gamelandAutoGoldHEN', 'true');
            } catch(e) {
                console.error("Storage error:", e);
            }
            statusEl.innerHTML = "کامل شد! در حال هدایت به صفحه اصلی...";
            setTimeout(function() {
                location.replace('index.html');
            }, 1000);
        }

        function onProgress(e) {
            if (e.total) {
                var percent = Math.round((e.loaded / e.total) * 100);
                statusEl.innerHTML = "در حال دانلود فایل‌ها: " + percent + "%";
            } else {
                statusEl.innerHTML = "در حال دانلود فایل‌ها...";
            }
        }

        function onError(e) {
            statusEl.innerHTML = "خطا در نصب کش! در حال تلاش مجدد...";
            setTimeout(function() {
                location.reload();
            }, 3000);
        }

        appCache.addEventListener('progress', onProgress, false);
        appCache.addEventListener('cached', markAndGoToIndex, false);
        appCache.addEventListener('updateready', markAndGoToIndex, false);
        appCache.addEventListener('noupdate', markAndGoToIndex, false);
        appCache.addEventListener('error', onError, false);
    </script>
</body>
</html>
