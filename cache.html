<html manifest="PSFree.manifest">
<head>
<title>PSFree-Lapse Exploit For PS4 9.00</title>
<link rel="shortcut icon" href="favicon.ico"></link>
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    background-image: url("bg.jpg");
    background-repeat: no-repeat;
    background-size:70%;
    background-position: center;
    background-color: white;
    color:black;
    font-size:20px;
    text-align:center;
    margin:0;
    overflow:hidden;
}
.info{
    overflow:hidden;
    position:fixed;
    position:absolute;
    top:45%;
    left:50%;
    font-size:25px;
    font-family:sans-serif;
    color:black;
    transform:translate(-50%, -50%);
}
</style>
<script>
var msgs = null;

function setMessage(text) {
    if (!msgs) msgs = document.getElementById("msgs");
    if (msgs) msgs.innerHTML = text;
}

function DLProgress(e) {
    if (!e || !e.total) {
        setMessage("Installing Offline Cache ...");
        return;
    }
    var Percent = Math.round((e.loaded / e.total) * 100);
    setMessage("Installing Offline Cache ... " + Percent + "%");
}

function CacheInstalled() {
    setMessage("Cache Installed Successfully");
    setTimeout(function () {
        location.replace("index.html");
    }, 2000);
}

function CacheFailed() {
    setMessage("Cache Installation Failed");
}

function CacheNoUpdate() {
    setMessage("No Cache Update Needed");
    setTimeout(function () {
        location.replace("index.html");
    }, 1500);
}

function initCacheHandlers() {
    if (!window.applicationCache) {
        setMessage("Application Cache is not supported");
        return;
    }

    window.applicationCache.addEventListener("progress", DLProgress, false);
    window.applicationCache.addEventListener("cached", CacheInstalled, false);
    window.applicationCache.addEventListener("updateready", CacheInstalled, false);
    window.applicationCache.addEventListener("noupdate", CacheNoUpdate, false);
    window.applicationCache.addEventListener("error", CacheFailed, false);

    try {
        if (window.applicationCache.status === window.applicationCache.CACHED) {
            CacheInstalled();
        }
    } catch (e) {}
}

window.addEventListener("load", function () {
    msgs = document.getElementById("msgs");
    setMessage("Preparing Offline Cache ...");
    initCacheHandlers();
}, false);
</script>
</head>
<body style="overflow:hidden">
<div id="msgs" class="info" style='-webkit-font-feature-settings:"tnum";font-feature-settings:"tnum";'></div>
</body>
</html>
