<html manifest="psfree_lapse.cache">
<head>
<title>PSFree-Lapse Exploit For PS4 9.00</title>
<link rel="shortcut icon" href="favicon.ico"></link>
<style>
body{background-image:url("bg.jpg");background-repeat:no-repeat;background-size:70%;background-position:center;background-color:white;color:black;font-size:20px;text-align:center;margin:0;overflow:hidden;}
.info{overflow:hidden;position:fixed;position:absolute;top:45%;left:50%;font-size:25px;font-family:sans-serif;color:black;transform:translate(-50%, -50%);}
</style>
<script>
function DLProgress(e){
    Percent=(Math.round(e.loaded / e.total * 100));
    msgs.innerHTML="Installing Offline Cache ... " + Percent + "%";
}

function DisplayCacheProgress(){
    setTimeout(function(){
        msgs.innerHTML="Cache Installed Successfully";
        localStorage.setItem('offlineCacheInstalled', 'true');
    },2000);
}

window.applicationCache.addEventListener("progress", DLProgress, false);
window.applicationCache.oncached = function(e){
    localStorage.setItem('offlineCacheInstalled', 'true');
    DisplayCacheProgress();
};
window.applicationCache.onupdateready = function(e){
    localStorage.setItem('offlineCacheInstalled', 'true');
    DisplayCacheProgress();
};
window.applicationCache.onerror = function(e){
    msgs.innerHTML="Error while installing cache";
};
</script>
</head>
<body style="overflow:hidden">
<div id="msgs" class="info" style='-webkit-font-feature-settings:"tnum";font-feature-settings:"tnum";'></div>
</body>
</html>
