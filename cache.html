<script>
function markAndGoToIndex() {
    localStorage.setItem('gamelandAutoGoldHEN', '1');
    location.replace('index.html');
}

function onInstalled() {
    setMessage('Cache Installed Successfully');
    setTimeout(markAndGoToIndex, 1000);
}

function onProgress(e) {
    // existing logic
}

function onError() {
    setMessage('Offline cache installation failed');
}

window.addEventListener('load', function () {
    if (!window.applicationCache) {
        setMessage('Application cache is not supported');
        return;
    }

    var appCache = window.applicationCache;
    appCache.addEventListener('progress', onProgress, false);
    appCache.addEventListener('cached', onInstalled, false);
    appCache.addEventListener('updateready', onInstalled, false);
    appCache.addEventListener('noupdate', markAndGoToIndex, false);
    appCache.addEventListener('error', onError, false);
}, false);
</script>
