            document.getElementById('main-stylesheet').setAttribute('href', './includes/css/layouts/' + savedTheme + '.css');
        }
        if (savedColor){
            document.getElementById('color-stylesheet').setAttribute('href', './includes/css/colors/' + savedColor + '.css');

    <!-- Global Error Tracker -->
    <script>
        window.onerror = function (msg, url, linenumber) {
            alert('Error message: ' + msg + '\nURL: ' + url + '\nLine Number: ' + linenumber);
            return true;
        }

        var ua = navigator.userAgent;
        var isPS4 = ua.indexOf("PlayStation 4") !== -1;
        var is67x = ((ua.indexOf(" 6.70") !== -1) || (ua.indexOf(" 6.71") !== -1) || (ua.indexOf(" 6.72") !== -1));
        window.entrypoint672_result = 0;
        window.exploitsetup672_result = 0;

        var userlandOnlyOnJB67x = localStorage.getItem("userlandOnlyOnJB67x") == "true";
        // Load 6.7x entrypoint if needed conditionally
        if (isPS4 && is67x && !userlandOnlyOnJB67x) {
            try {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', 'includes/js/exploits/672entrypoint.js', false);
                xhr.send('');
                if (xhr.status === 200) {
                    eval.call(top.window, xhr.responseText);
                }
            } catch (e) {
                // Safe non-breaking fallbacks if DOM isn't ready
                console.error("Early entrypoint hook failed: " + e.message);
            }
        }

        // Cache
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof loadSettings === 'function') {
                loadSettings();
            }
            // check for applicationCache
            if (window.applicationCache) {
                window.applicationCache.addEventListener("progress", DLProgress, false);
                window.applicationCache.oncached = function (e) { DisplayCacheProgress(); };
                window.applicationCache.onupdateready = function (e) { DisplayCacheProgress(); };
            } else {
                console.warn("This browser does not support save in cache!");
            }
        });
    </script>

    <!-- === Auto-start Logic === -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check if the auto-start flag is set
            if (localStorage.getItem('gamelandAutoGoldHEN') === '1') {
                var exploitButton = document.getElementById('exploitRun');
                // Ensure the exploit button exists and is enabled (or will be enabled by other scripts)
                // We might need a small delay to ensure the button is ready and enabled
                setTimeout(function() {
                    if (exploitButton && !exploitButton.disabled) {
                        exploitButton.click(); // Trigger the click event
                        localStorage.removeItem('gamelandAutoGoldHEN'); // Clear the flag after attempting to run
                    } else {
                        // If the button is not ready or disabled, remove the flag so it doesn't get stuck
                        localStorage.removeItem('gamelandAutoGoldHEN');
                        console.log('Auto-start: Exploit button not ready or disabled.');
                    }
                }, 500); // Small delay, adjust if needed
            }
        });
    </script>
    <!-- === End Auto-start Logic === -->
