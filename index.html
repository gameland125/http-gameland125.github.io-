<!DOCTYPE html>
<html lang="fa" manifest="PSFree.manifest">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="PSFree.manifest">
    <title>GAMELAND</title>
    <link rel="stylesheet" href="./includes/css/colors/default.css">
    <link rel="stylesheet" href="./includes/css/layouts/index.css">
    <link rel="stylesheet" href="./includes/css/layouts/compact.css">
</head>
<body>
    <div id="app"></div>
    <div id="loading-screen">
        <div id="loading-animation"></div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <p id="loading-text">در حال بارگذاری...</p>
    </div>

    <!-- اسکریپت‌های اصلی -->
    <script id="main-logic-loader">
        (function () {
            var isModern = 'noModule' in document.createElement('script');
            var scriptPath = isModern ? './includes/js/index.js' : './includes/js/index-legacy.js';
            document.write('<script src="' + scriptPath + '"><\/script>');
        })();
    </script>
    <script src="./includes/payloads/payloads.js"></script>
    <script src="./includes/js/payloadsList.js"></script>
    <script src="./includes/js/design.js"></script>
    <script src="./includes/js/language.js"></script>
    <script src="./includes/js/HENs.js"></script>
    <script src="./includes/js/checkFw.js"></script>
    <script src="./includes/js/autoJbRetry.js"></script>
    <script src="./includes/js/events.js"></script>

    <!-- کد ریدایرکت مخفی - منتقل شده به انتها -->
    <script>
        window.addEventListener('load', function() {
            // ریدایرکت به صفحه خالی پس از بارگذاری کامل برای مخفی‌سازی
            // این شرط تنها در صورتی اجرا می‌شود که URL حاوی #success باشد
            if(window.location.hash == "#success") {
                // استفاده از replace برای جلوگیری از اضافه شدن به تاریخچه مرورگر
                window.location.replace("about:blank");
            }
        });
    </script>
</body>
</html>
