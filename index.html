<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>gameland</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#2c2c2c">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body class="state-preparing">

    <div id="app">
        <!-- وضعیت آماده‌سازی -->
        <div id="status-container">
            <div id="message" class="message">در حال آماده‌سازی...</div>
            
            <!-- دکمه‌های خطا (در ابتدا مخفی هستند) -->
            <div id="error-controls" class="hidden">
                <button onclick="location.reload()" class="btn btn-retry">تلاش دوباره</button>
                <button onclick="window.location.href='about:blank'" class="btn btn-menu">بازگشت به منو</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js');
            });
        }
    </script>
</body>
</html>
