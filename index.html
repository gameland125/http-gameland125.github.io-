<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PS4 9.00 Host</title>
<style>
body { background:#0b0b0b; color:#0f0; text-align:center; font-family:sans-serif; }
h1 { margin-top:50px; }
button { padding:15px 30px; font-size:18px; margin-top:30px; }
</style>
</head>
<body>

<h1>PS4 9.00 Auto Host</h1>
<p id="status">در حال آماده سازی...</p>

<button onclick="go()">Start GoldHEN</button>

<script>
document.getElementById("status").innerHTML = "در حال نصب کش آفلاین...";

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(() => {
        document.getElementById("status").innerHTML = "✔ کش نصب شد";
    }).catch(() => {
        document.getElementById("status").innerHTML = "❌ خطا در کش";
    });
}

function go(){
    location.href = "auto.html";
}
</script>

</body>
</html>
